# yaml-language-server: $schema=https://raw.githubusercontent.com/jesseduffield/lazygit/master/schema/config.json

customCommands:
  - key: "C"
    context: "files"
    description: "Create new conventional commit with Gitmoji"
    prompts:
      - type: "menu"
        key: "type"
        title: "Select the type of change"
        options:
          - name: "✨ feat"
            description: "A new feature"
            value: "feat"
          - name: "🐛 fix"
            description: "A bug fix"
            value: "fix"
          - name: "📝 docs"
            description: "Documentation only changes"
            value: "docs"
          - name: "🎨 style"
            description: "Changes that do not affect the meaning of the code"
            value: "style"
          - name: "♻️ refactor"
            description: "A code change that neither fixes a bug nor adds a feature"
            value: "refactor"
          - name: "⚡️ perf"
            description: "A code change that improves performance"
            value: "perf"
          - name: "✅ test"
            description: "Adding missing tests or correcting existing tests"
            value: "test"
          - name: "🏗️ build"
            description: "Changes that affect the build system or external dependencies"
            value: "build"
          - name: "💚 ci"
            description: "Changes to our CI configuration files and scripts"
            value: "ci"
          - name: "🔨chore"
            description: "Other changes that don't modify src or test files"
            value: "chore"
          - name: "⏪ revert"
            description: "Reverts a previous commit"
            value: "revert"

      - type: "input"
        title: "Enter the scope"
        key: "scope"

      - type: "menu"
        key: "gitmoji"
        title: "Select a Gitmoji"
        options:
          - name: "✨ sparkles"
            value: "✨"
            description: "Introduce new features."
          - name: "🐛 bug"
            value: "🐛"
            description: "Fix a bug."
          - name: "📝 memo"
            value: "📝"
            description: "Add or update documentation."
          - name: "🎨 art"
            value: "🎨"
            description: "Improve structure / format of the code."
          - name: "🔥 fire"
            value: "🔥"
            description: "Remove code or files."
          - name: "⚡️ zap"
            value: "⚡️"
            description: "Improve performance."
          - name: "🚑️ ambulance"
            value: "🚑️"
            description: "Critical hotfix."
          - name: "🚀 rocket"
            value: "🚀"
            description: "Deploy stuff."
          - name: "💄 lipstick"
            value: "💄"
            description: "Add or update the UI and style files."
          - name: "✅ white-check-mark"
            value: "✅"
            description: "Add, update, or pass tests."
          - name: "🏗️ building-construction"
            value: "🏗️"
            description: "Make architectural changes."
          - name: "♻️ recycle"
            value: "♻️"
            description: "Refactor code."
          - name: "🔧 wrench"
            value: "🔧"
            description: "Add or update configuration files."
          - name: "🔨 hammer"
            value: "🔨"
            description: "Add or update development scripts."
          - name: "🩹 adhesive-bandage"
            value: "🩹"
            description: "Simple fix for a non-critical issue."
          - name: "📦️ package"
            value: "📦️"
            description: "Add or update compiled files or packages."
          - name: "🚨 rotating-light"
            value: "🚨"
            description: "Fix compiler / linter warnings."
          - name: "🚧 construction"
            value: "🚧"
            description: "Work in progress."
          - name: "💚 green-heart"
            value: "💚"
            description: "Fix CI Build."
          - name: "⬇️ arrow-down"
            value: "⬇️ "
            description: "Downgrade dependencies."
          - name: "⬆️ arrow-up"
            value: "⬆️ "
            description: "Upgrade dependencies."
          - name: "📌 pushpin"
            value: "📌"
            description: "Pin dependencies to specific versions."
          - name: "👷 construction-worker"
            value: "👷"
            description: "Add or update CI build system."
          - name: "📈 chart-with-upwards-trend"
            value: "📈"
            description: "Add or update analytics or track code."
          - name: "➕ heavy-plus-sign"
            value: "➕"
            description: "Add a dependency."
          - name: "➖ heavy-minus-sign"
            value: "➖"
            description: "Remove a dependency."
          - name: "🌐 globe-with-meridians"
            value: "🌐"
            description: "Internationalization and localization."
          - name: "✏️ pencil2"
            value: "✏️"
            description: "Fix typos."
          - name: "💩 poop"
            value: "💩"
            description: "Write bad code that needs to be improved."
          - name: "⏪️ rewind"
            value: "⏪️"
            description: "Revert changes."
          - name: "🔀 twisted-rightwards-arrows"
            value: "🔀"
            description: "Merge branches."
          - name: "👽️ alien"
            value: "👽️"
            description: "Update code due to external API changes."
          - name: "🚚 truck"
            value: "🚚"
            description: "Move or rename resources."
          - name: "💥 boom"
            value: "💥"
            description: "Introduce breaking changes."
          - name: "🍱 bento"
            value: "🍱"
            description: "Add or update assets."
          - name: "♿️ wheelchair"
            value: "♿️"
            description: "Improve accessibility."
          - name: "💡 bulb"
            value: "💡"
            description: "Add or update comments."
          - name: "🍻 beers"
            value: "🍻"
            description: "Write code drunkenly."
          - name: "💬 speech-balloon"
            value: "💬"
            description: "Add or update text and literals."
          - name: "🗃️ card-file-box"
            value: "🗃️"
            description: "Perform database related changes."
          - name: "🔊 loud-sound"
            value: "🔊"
            description: "Add or update logs."
          - name: "🔇 mute"
            value: "🔇"
            description: "Remove logs."
          - name: "📱 iphone"
            value: "📱"
            description: "Work on responsive design."
          - name: "🤡 clown-face"
            value: "🤡"
            description: "Mock things."
          - name: "🥚 egg"
            value: "🥚"
            description: "Add or update an easter egg."
          - name: "🙈 see-no-evil"
            value: "🙈"
            description: "Add or update a .gitignore file."
          - name: "📸 camera-flash"
            value: "📸"
            description: "Add or update snapshots."
          - name: "⚗️ alembic"
            value: "⚗️"
            description: "Perform experiments."
          - name: "🔍️ mag"
            value: "🔍️"
            description: "Improve SEO."
          - name: "🏷️ label"
            value: "🏷️"
            description: "Add or update types."
          - name: "🌱 seedling"
            value: "🌱"
            description: "Add or update seed files."
          - name: "🚩 triangular-flag-on-post"
            value: "🚩"
            description: "Add, update, or remove feature flags."
          - name: "🥅 goal-net"
            value: "🥅"
            description: "Catch errors."
          - name: "💫 dizzy"
            value: "💫"
            description: "Add or update animations and transitions."
          - name: "🗑️ wastebasket"
            value: "🗑️"
            description: "Deprecate code."
          - name: "🛂 passport-control"
            value: "🛂"
            description: "Work on authorization/permissions."
          - name: "🧐 monocle-face"
            value: "🧐"
            description: "Data exploration/inspection."
          - name: "⚰️ coffin"
            value: "⚰️"
            description: "Remove dead code."
          - name: "🧪 test-tube"
            value: "🧪"
            description: "Add a failing test."
          - name: "👔 necktie"
            value: "👔"
            description: "Add or update business logic."
          - name: "🩺 stethoscope"
            value: "🩺"
            description: "Add or update healthcheck."
          - name: "🧑‍💻 technologist"
            value: "🧑‍💻"
            description: "Improve developer experience."
          - name: "🦖 t-rex"
            value: "🦖"
            description: "Code that adds backwards compatibility."

      - type: "input"
        title: "Write a short, imperative subject"
        key: "subject"

      - type: "input"
        title: "Provide a longer description (body)"
        key: "body"

    command: "git commit --message '{{.Form.type}}{{ if .Form.scope }}({{ .Form.scope }}){{ end }}: {{ .Form.gitmoji }} {{.Form.subject}}' {{ if .Form.body }}--message '{{ .Form.body }}'{{ end }}"
    loadingText: "Creating conventional commit..."
